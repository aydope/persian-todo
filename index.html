<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>وظیفه من</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;800&display=swap");

      :root {
        --imperial-blue: #1a2a44;
        --persian-gold: #c5a059;
        --stone-gray: #f2f4f7;
      }

      body {
        font-family: "Vazirmatn", sans-serif;
        background: var(--stone-gray);
        background-image: radial-gradient(
          circle at 2px 2px,
          #e2e8f0 1px,
          transparent 0
        );
        background-size: 24px 24px;
      }

      .task-card {
        background: white;
        border: 1px solid #e5e7eb;
        transition: all 0.2s ease;
      }

      .task-card:hover {
        background: #fafafa;
      }

      .imperial-border {
        border-right: 4px solid var(--persian-gold);
      }

      .dragging {
        opacity: 0.3;
        transform: scale(0.98);
        box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
      }

      #customDropdown {
        display: none;
        z-index: 100;
        border: 1px solid #e5e7eb;
      }

      .btn-empire {
        background: var(--imperial-blue);
        color: var(--persian-gold);
        border: 1px solid var(--persian-gold);
      }

      .btn-empire:hover {
        background: #0f1a2a;
        transform: translateY(-1px);
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="min-h-screen pb-20">
    <div
      id="preloader"
      class="fixed inset-0 z-[110] bg-[#1a2a44] flex flex-col items-center justify-center"
    >
      <div class="mb-6 opacity-80">
        <i class="bi bi-shield-shaded text-6xl text-[#c5a059]"></i>
      </div>
      <span class="text-[#c5a059] text-sm tracking-[5px] font-bold"
        >پندار نیک . گفتار نیک . کردار نیک</span
      >
    </div>

    <div class="max-w-2xl mx-auto pt-16 px-6">
      <header
        class="mb-12 flex justify-between items-center border-b border-gray-200 pb-6"
      >
        <div class="flex items-center gap-4">
          <div
            class="w-12 h-12 bg-[#1a2a44] rounded-lg flex items-center justify-center text-[#c5a059] shadow-lg"
          >
            <i class="bi bi-trophy-fill text-xl"></i>
          </div>
          <div>
            <h1
              class="text-2xl font-black text-slate-800 tracking-tight italic"
            >
              فرمانروایی بر زمان
            </h1>
            <p id="date-display" class="text-slate-400 text-xs font-medium"></p>
          </div>
        </div>
        <div class="flex flex-col items-end">
          <span
            id="task-count"
            class="text-[10px] font-black bg-gray-100 px-3 py-1 rounded text-slate-500 uppercase"
            >درحال پردازش: ۰</span
          >
        </div>
      </header>

      <div
        id="inputBox"
        class="bg-white border border-gray-200 rounded-xl p-6 mb-10 shadow-sm"
      >
        <div class="flex flex-col gap-2">
          <input
            type="text"
            id="taskInput"
            placeholder="وظیفه جدید را وارد کنید..."
            class="w-full bg-transparent text-xl font-bold outline-none placeholder:text-gray-300 text-slate-700"
          />
          <textarea
            id="taskDescInput"
            placeholder="برای افزودن توضیحات، اینجا بنویسید..."
            class="w-full bg-transparent text-sm text-slate-500 outline-none resize-none h-10 placeholder:text-gray-200 mt-2 border-r border-gray-100 pr-4"
          ></textarea>

          <div class="flex items-center justify-between mt-6">
            <div class="relative">
              <div
                id="dropdownTrigger"
                class="flex items-center gap-2 cursor-pointer text-xs font-bold text-slate-500 hover:bg-gray-50 px-3 py-2 rounded-md transition-all"
              >
                <i
                  id="selectedIcon"
                  class="bi bi-collection-fill text-[#c5a059]"
                ></i>
                <span id="selectedLabel">دسته‌بندی</span>
                <i class="bi bi-chevron-down text-[10px]"></i>
              </div>
              <div
                id="customDropdown"
                class="absolute top-full mt-1 w-48 bg-white rounded-lg shadow-xl p-1 border border-gray-100"
              >
                <div
                  class="tag-opt p-2 hover:bg-gray-50 rounded cursor-pointer text-xs flex items-center gap-3"
                  data-val="شخصی"
                  data-icon="bi-person-fill"
                  data-color="text-blue-500"
                >
                  <i class="bi bi-person-fill text-blue-500"></i> امور شخصی
                </div>
                <div
                  class="tag-opt p-2 hover:bg-gray-50 rounded cursor-pointer text-xs flex items-center gap-3"
                  data-val="امپراتوری"
                  data-icon="bi-briefcase-fill"
                  data-color="text-[#c5a059]"
                >
                  <i class="bi bi-briefcase-fill text-[#c5a059]"></i> امور کاری
                </div>
                <div
                  class="tag-opt p-2 hover:bg-gray-50 rounded cursor-pointer text-xs flex items-center gap-3"
                  data-val="ضروری"
                  data-icon="bi-fire"
                  data-color="text-red-500"
                >
                  <i class="bi bi-fire text-red-500"></i> اولویت بالا
                </div>
              </div>
            </div>

            <button
              id="addBtn"
              class="btn-empire px-8 py-2 rounded-lg text-xs font-black flex items-center gap-2 shadow-md transition-all"
            >
              <span>افزودن به کتیبه</span>
              <div
                id="btnLoader"
                class="hidden w-3 h-3 border-2 border-[#c5a059]/30 border-t-[#c5a059] rounded-full animate-spin"
              ></div>
            </button>
          </div>
        </div>
      </div>

      <div id="taskList" class="space-y-1"></div>
    </div>
    <script>
      $(document).ready(function () {
        // =============================
        // Application State Management
        // =============================

        // Load tasks from sessionStorage (session-scoped persistence)
        // Fallback to empty array if no stored data exists
        let tasks = JSON.parse(sessionStorage.getItem("todos")) || [];

        // Currently selected tag metadata for new tasks
        let currentTag = {
          label: "شخصی",
          icon: "bi-person-fill",
          color: "text-blue-500",
        };

        // =============================
        // 1. Initial Setup
        // =============================

        // Render current date in Persian locale format
        const options = {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        };

        $("#date-display").text(
          new Date().toLocaleDateString("fa-IR", options),
        );

        // =============================
        // 2. Custom UI Interactions
        // =============================

        $("#dropdownTrigger").on("click", (e) => {
          e.stopPropagation();
          $("#customDropdown").fadeToggle(150);
        });

        $(".tag-opt").on("click", function () {
          // Update selected tag state
          currentTag = {
            label: $(this).data("val"),
            icon: $(this).data("icon"),
            color: $(this).data("color"),
          };

          // Reflect selection in UI
          $("#selectedLabel").text(currentTag.label);
          $("#selectedIcon").attr(
            "class",
            `bi ${currentTag.icon} ${currentTag.color}`,
          );

          $("#customDropdown").hide();
        });

        // Close dropdown when clicking outside
        $(document).on("click", () => $("#customDropdown").hide());

        // =============================
        // 3. Render Tasks (Single Source of Truth)
        // =============================

        // Responsible for full UI re-render based on current state
        function renderTasks() {
          const $list = $("#taskList").empty();

          // Update task counter
          $("#task-count").text(
            `درحال پردازش: ${tasks.length.toLocaleString("fa-IR")}`,
          );

          tasks.forEach((task) => {
            // Determine whether task has a non-empty description
            const hasDesc = task.desc && task.desc.trim() !== "";

            const $item = $(`
          <div class="task-card group p-3 rounded-lg flex flex-col gap-2 imperial-border"
               draggable="true" data-id="${task.id}">
            <div class="flex items-center gap-3">

              <div class="handle opacity-0 group-hover:opacity-100 text-gray-300 cursor-grab transition-all">
                <i class="bi bi-grip-vertical text-xl"></i>
              </div>

              <div class="cursor-pointer flex items-center justify-center w-5 h-5 rounded border-2 ${
                task.completed
                  ? "bg-[#1a2a44] border-[#1a2a44]"
                  : "border-gray-200"
              }"
                   onclick="toggleComplete('${task.id}')">
                <i class="bi bi-check text-white text-xs ${
                  task.completed ? "" : "hidden"
                }"></i>
              </div>

              <div class="flex-grow flex items-center gap-3">
                <span class="text-sm font-medium ${
                  task.completed
                    ? "text-gray-300 line-through"
                    : "text-slate-700"
                }">${task.title}</span>

                <span class="text-[9px] font-bold px-2 py-0.5 rounded bg-gray-100 text-gray-400 opacity-60">
                  ${task.tagLabel}
                </span>
              </div>

              <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100">
                ${
                  hasDesc
                    ? `<button onclick="toggleDetails('${task.id}')" class="p-1 text-gray-400 hover:text-[#1a2a44]">
                        <i class="bi bi-chevron-down text-xs"></i>
                       </button>`
                    : ""
                }

                <button onclick="deleteTask('${task.id}')" class="p-1 text-gray-400 hover:text-red-500">
                  <i class="bi bi-x-lg text-xs"></i>
                </button>
              </div>
            </div>

            <div class="details hidden pr-14 pl-4 py-2 text-xs text-slate-400 border-r border-gray-100 mt-1">
              ${task.desc}
            </div>
          </div>
        `);

            $list.append($item);
          });

          initDragAndDrop();
        }

        // =============================
        // 4. Drag & Drop Logic
        // =============================

        // Initializes drag behavior and reconciles DOM order with state
        function initDragAndDrop() {
          const list = document.getElementById("taskList");
          let draggedItem = null;

          $(".task-card").on("dragstart", function () {
            draggedItem = this;
            setTimeout(() => $(this).addClass("dragging"), 0);
          });

          $(".task-card").on("dragend", function () {
            $(this).removeClass("dragging");

            // Rebuild tasks array based on new DOM order
            // Ensures UI order and state remain consistent
            const newOrder = [];

            $(".task-card").each(function () {
              const id = $(this).data("id");
              newOrder.push(tasks.find((t) => t.id == id));
            });

            tasks = newOrder;
            sessionStorage.setItem("todos", JSON.stringify(tasks));
          });

          list.addEventListener("dragover", (e) => {
            e.preventDefault();

            const afterElement = getDragAfterElement(list, e.clientY);

            if (afterElement == null) list.appendChild(draggedItem);
            else list.insertBefore(draggedItem, afterElement);
          });
        }

        // Determine correct insertion point during drag operation
        function getDragAfterElement(container, y) {
          const elements = [
            ...container.querySelectorAll(".task-card:not(.dragging)"),
          ];

          return elements.reduce(
            (closest, child) => {
              const box = child.getBoundingClientRect();
              const offset = y - box.top - box.height / 2;

              if (offset < 0 && offset > closest.offset)
                return { offset: offset, element: child };
              else return closest;
            },
            { offset: Number.NEGATIVE_INFINITY },
          ).element;
        }

        // =============================
        // Public API (Global Handlers)
        // =============================

        // Add new task → validate → persist → re-render
        window.addTask = () => {
          const title = $("#taskInput").val().trim();
          const desc = $("#taskDescInput").val().trim();

          if (!title) {
            gsap.to("#inputBox", {
              x: 5,
              repeat: 5,
              yoyo: true,
              duration: 0.05,
            });
            return;
          }

          $("#btnLoader").removeClass("hidden");

          setTimeout(() => {
            tasks.unshift({
              id: Date.now(),
              title,
              desc,
              tagLabel: currentTag.label,
              tagIcon: currentTag.icon,
              completed: false,
            });

            sessionStorage.setItem("todos", JSON.stringify(tasks));

            renderTasks();

            $("#taskInput, #taskDescInput").val("");
            $("#btnLoader").addClass("hidden");

            gsap.from(".task-card:first", {
              opacity: 0,
              y: -20,
              duration: 0.4,
            });
          }, 300);
        };

        // Toggle completion status and re-render
        window.toggleComplete = (id) => {
          const task = tasks.find((t) => t.id == id);
          task.completed = !task.completed;

          sessionStorage.setItem("todos", JSON.stringify(tasks));
          renderTasks();
        };

        // Delete task by id → persist → re-render
        window.deleteTask = (id) => {
          tasks = tasks.filter((t) => t.id != id);
          sessionStorage.setItem("todos", JSON.stringify(tasks));
          renderTasks();
        };

        // Toggle task description visibility
        window.toggleDetails = (id) => {
          $(`.task-card[data-id="${id}"] .details`).slideToggle(200);
        };

        // Keyboard shortcut (Enter key)
        $("#taskInput").on("keypress", (e) => {
          if (e.which === 13) window.addTask();
        });

        $("#addBtn").on("click", window.addTask);

        // =============================
        // Initial Preloader Animation
        // =============================

        setTimeout(() => {
          gsap.to("#preloader", {
            opacity: 0,
            duration: 0.8,
            onComplete: () => {
              $("#preloader").remove();
              renderTasks();
            },
          });
        }, 1200);
      });
    </script>
  </body>
</html>
